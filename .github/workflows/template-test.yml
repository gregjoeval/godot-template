name: Template Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: template-test-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.6-stable"

jobs:
  test-template:
    name: Test template generation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Generate project (defaults)
        run: |
          uvx copier copy --defaults --trust . /tmp/test-project
          ls /tmp/test-project

      - name: Verify project.godot exists
        run: test -f /tmp/test-project/project.godot

      - name: Verify pyproject.toml exists
        run: test -f /tmp/test-project/pyproject.toml

      - name: Verify C# files present
        run: |
          test -f /tmp/test-project/MyGodotGame.csproj
          test -f /tmp/test-project/MyGodotGame.sln
          test -f /tmp/test-project/GlobalUsings.cs
          test -f /tmp/test-project/.csharpierrc.yaml
          test -f /tmp/test-project/.editorconfig
          test -f /tmp/test-project/scenes/Main.cs
          test -f /tmp/test-project/docs/csharp-conventions.md
          echo "PASS: All C# files present"

      - name: Verify no GDScript files present
        run: |
          ! test -f /tmp/test-project/scenes/main.gd
          ! test -f /tmp/test-project/.gdlintrc
          ! test -f /tmp/test-project/.gdformatrc
          ! test -d /tmp/test-project/tests_gdunit4
          echo "PASS: No GDScript files"

      - name: Verify C# in project.godot features
        run: grep -q '"C#"' /tmp/test-project/project.godot

      - name: Verify dotnet in .godotrc
        run: |
          grep -q "dotnet" /tmp/test-project/.godotrc
          ! grep -q "no-dotnet" /tmp/test-project/.godotrc

      - name: Verify NetworkManager in project.godot
        run: |
          grep -q "NetworkManager.cs" /tmp/test-project/project.godot
          echo "PASS: NetworkManager autoload present"

      - name: Verify NetworkManager.cs exists
        run: test -f /tmp/test-project/scripts/network/NetworkManager.cs

      - name: Verify multiplayer test helper
        run: |
          grep -q "SetupOfflineMultiplayer" /tmp/test-project/tests/helpers/TestHelper.cs
          echo "PASS: Multiplayer test helper present"

      - name: Verify CLAUDE.md multiplayer section
        run: grep -q "Multiplayer Patterns" /tmp/test-project/CLAUDE.md

      - name: Verify scenes/main.tscn exists
        run: test -f /tmp/test-project/scenes/main.tscn

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Godot .NET
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.0
          use-dotnet: true

      - name: Restore and build C# project
        run: |
          cd /tmp/test-project
          dotnet restore MyGodotGame.sln
          dotnet build MyGodotGame.sln --no-restore
